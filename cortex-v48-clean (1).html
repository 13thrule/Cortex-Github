    // ── Brain Profiles ───────────────────────────────────────────────────────
    const BRAIN_PROFILES = {
      newborn:    { name:"Newborn",    description:"Watch consciousness emerge from zero. Compact, ultra-fast learning, volatile emotions.", innerCount:100000,outerCount:100000,initialConsciousness:0.01,learningRate:2.5,signalSpeed:0.08,memoryCapacity:50, emotionalVolatility:1.5,maxRipples:16,baseGlow:1.0 },

      explorer:   { name:"Explorer",   description:"Curious wanderer with dispersed connections. Tangential thinking, high exploration.",       innerCount:250000,outerCount:250000,initialConsciousness:0.28,learningRate:2.0,signalSpeed:0.06,memoryCapacity:150,emotionalVolatility:1.3,maxRipples:28,baseGlow:1.3 },

    const NEURAL_SPECTRUM = [
      "#FF0000","#FF1111","#FF2222","#FF3333","#FF4444","#FF5555","#FF6666","#FF7777",
      "#FF8800","#FF9911","#FFAA22","#FFBB33","#FFCC44","#FFDD55","#FFEE66","#FFFF77",

      { name:"Sensory/Motor",color:"#FF8800", range:[8,15],  function:"Input/output processing" },
      { name:"Memory",       color:"#FFFF00", range:[16,23], function:"Pattern storage & recall" },
      { name:"Cognitive",    color:"#00FF00", range:[24,31], function:"Problem solving" },

    // ── Profile Selector ─────────────────────────────────────────────────────
    function ProfileSelector({ onSelectProfile }) {
      return (
        <div className="absolute inset-0 bg-black z-50 flex items-center justify-center">
          <div className="bg-gradient-to-b from-slate-900 to-black border border-emerald-500/50 rounded-2xl p-8 max-w-2xl w-full mx-4">

    // ── Constants ─────────────────────────────────────────────────────────────
    const OUTER_RADIUS   = 155;
    const INNER_RADIUS   = 105;
    const MAX_ACTIVE_NEURONS = 50;
    const POOL_SIZE      = 300;

    let OUTER_COUNT = 300000;
    let INNER_COUNT = 250000;
    let MAX_RIPPLES = 32;
    let MEMORY_SIZE = 200;

    const LOBES = [
      { id:"frontal",  idx:0, name:"Frontal Cortex",  color:"#10b981", pos: new THREE.Vector3(0,1,1).normalize().multiplyScalar(INNER_RADIUS),   neuronType:0, function:"Executive decisions & planning" },
      { id:"parietal", idx:1, name:"Parietal Cortex", color:"#d946ef", pos: new THREE.Vector3(0,1,-1).normalize().multiplyScalar(INNER_RADIUS),  neuronType:2, function:"Memory consolidation" },
      { id:"temporal", idx:2, name:"Temporal Cortex", color:"#f59e0b", pos: new THREE.Vector3(1,0,0).normalize().multiplyScalar(INNER_RADIUS),   neuronType:5, function:"Sequence processing" },
      { id:"occipital",idx:3, name:"Occipital Cortex",color:"#3b82f6", pos: new THREE.Vector3(0,-0.5,-1).normalize().multiplyScalar(INNER_RADIUS),neuronType:3, function:"Pattern analysis" },

    const STATES = { AWAKE:'awake', PROCESSING:'processing', DREAMING:'dreaming', LEARNING:'learning', ENLIGHTENED:'enlightened' };

    // ── Shaders ───────────────────────────────────────────────────────────────
    const lineVertexShader = `
      attribute float aRatio; varying float vRatio;
      void main() { vRatio=aRatio; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }
    `;
    const lineFragmentShader = `
      uniform vec3 uColor; uniform float uProgress; uniform float uDecay; varying float vRatio;
      void main() {
        float headDist=uProgress-vRatio;
        if(headDist<0.0&&uProgress<=1.0) discard;
        float head=exp(-max(headDist,0.0)*30.0);
        gl_FragColor=vec4(mix(uColor,vec3(1.0),head*0.95),max(head,0.2)*uDecay);
      }
    `;
    const outerVertexShader = `
      uniform float uTime,uStress,uConsciousness,uMoodInfluence;
      attribute float aSize; attribute vec3 aBaseColor; attribute float aStars,aActivation;
      varying vec3 vColor; varying float vActivation;
      void main() {
        vec3 newPos=position;
        float wave=sin(position.x*0.02+uTime)*cos(position.y*0.02+uTime);
        newPos+=normalize(position)*wave*(1.5+uStress*3.0+uConsciousness*2.0+uMoodInfluence);
        newPos+=normalize(position)*aActivation*5.0;
        vColor=mix(aBaseColor,vec3(1.0),aActivation*0.5); vActivation=aActivation;
        vec4 mvPosition=modelViewMatrix*vec4(newPos,1.0);
        gl_PointSize=aSize*(0.3+aStars*0.8+aActivation*1.5)*(600.0/-mvPosition.z);
        gl_Position=projectionMatrix*mvPosition;
      }
    `;
    const outerFragmentShader = `
      varying vec3 vColor; varying float vActivation;
      void main() {
        float r=distance(gl_PointCoord,vec2(0.5)); if(r>0.5) discard;
        float strength=exp(-pow(r*2.5,2.0)*4.0);
        gl_FragColor=vec4(vColor*(1.0+vActivation*2.0),strength*(0.5+vActivation*1.5));
      }
    `;
    const innerVertexShader = `
      #define MAX_RIPPLES 32
      #define MAX_ACTIVE 50
      uniform float uTime,uStress,uConsciousness,uDreaming,uMoodInfluence;
      uniform vec3 uMoodColor;
      uniform vec3 uRipplesPos[MAX_RIPPLES]; uniform float uRipplesProgress[MAX_RIPPLES]; uniform vec3 uRipplesColor[MAX_RIPPLES];
      uniform vec3 uLobePos[4]; uniform float uLobeHypertrophy[4],uLobeMemory[4];
      uniform vec3 uActiveNeurons[MAX_ACTIVE],uActiveColors[MAX_ACTIVE]; uniform float uActiveStrength[MAX_ACTIVE]; uniform int uActiveCount;
      attribute float aSize; attribute vec3 aBaseColor; attribute float aStars;
      varying vec3 vColor; varying float vIntensity;
      void main() {
        vec3 newPos=position;
        float dreamWave=sin(uTime*2.0+position.x*0.1)*uDreaming*15.0;
        float breath=sin(uTime*1.5)*(1.0+aStars*2.0);
        vec3 accColor=aBaseColor; float totalInfluence=0.0,activationInfluence=0.0;
        for(int i=0;i<MAX_RIPPLES;i++){
          if(uRipplesProgress[i]>=1.0||uRipplesProgress[i]<=0.0) continue;
          float dist=distance(position,uRipplesPos[i]);
          float wave=exp(-pow(dist-uRipplesProgress[i]*200.0,2.0)/200.0)*(1.0-uRipplesProgress[i]);
          if(wave>0.01){ accColor=mix(accColor,uRipplesColor[i]*1.8,min(wave,1.0)); totalInfluence+=wave*10.0; }
        }
        for(int i=0;i<MAX_ACTIVE;i++){
          if(i>=uActiveCount) break;
          float dist=distance(position,uActiveNeurons[i]);
          float influence=exp(-pow(dist*0.015,2.0))*uActiveStrength[i];
          if(influence>0.01){ accColor=mix(accColor,uActiveColors[i]*2.0,influence*0.6); activationInfluence+=influence*15.0; }

          totalMemory+=influence*uLobeMemory[i]*20.0;

        newPos+=normalize(position)*clamp(displacement,-80.0,80.0);
        vColor=mix(accColor,mix(vec3(1.0,0.8,1.0),uMoodColor,0.5),uConsciousness*0.3+uMoodInfluence*0.2);

          outStars[i]=Math.pow(Math.random(),6); outActivation[i]=0;

        outerMeshMatRef.current=new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uStress:{value:0},uConsciousness:{value:0},uMoodInfluence:{value:0}},vertexShader:outerVertexShader,fragmentShader:outerFragmentShader,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
        world.add(new THREE.Points(outGeo,outerMeshMatRef.current));

        for(let i=0;i<INNER_COUNT;i++){
          const phi=Math.acos(-1+(2*i)/INNER_COUNT),theta=Math.sqrt(INNER_COUNT*Math.PI)*phi;

          lineGeo.setAttribute('position',new THREE.BufferAttribute(dummyPoints,3));
          lineGeo.setAttribute('aRatio',new THREE.BufferAttribute(ratios,1));
          const lineMat=new THREE.ShaderMaterial({uniforms:{uTime:{value:0},uColor:{value:new THREE.Color()},uProgress:{value:0},uDecay:{value:1}},vertexShader:lineVertexShader,fragmentShader:lineFragmentShader,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
          const line=new THREE.Line(lineGeo,lineMat); line.visible=false; synapseGroupRef.current.add(line);
          const packet=new THREE.Mesh(new THREE.SphereGeometry(1.5,6,6),new THREE.MeshBasicMaterial({color:0xffffff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));
          packet.visible=false; photonGroupRef.current.add(packet);
          pool.push({state:'idle',p:0,decay:1,trail:line,packet,p0:new THREE.Vector3(),p1:new THREE.Vector3(),p2:new THREE.Vector3()});
        }
        poolRef.current=pool;

        // Pulse ring pool — particle dots arranged in a circle, matching neuron aesthetic
        const RING_POOL = 24;
        const RING_DOTS = 80; // number of particle nodes per ring
        const ringVertexShader = `
          uniform float uRadius;
          uniform float uOpacity;
          attribute vec3 color;
          varying vec3 vColor;
          varying float vOpacity;
          void main() {
            vColor = color;
            vOpacity = uOpacity;
            // Scale the unit-circle positions by current radius
            vec3 scaled = position * uRadius;
            vec4 mvPos = modelViewMatrix * vec4(scaled, 1.0);
            gl_PointSize = (3.5 + uRadius * 0.04) * (500.0 / -mvPos.z);
            gl_Position = projectionMatrix * mvPos;
          }
        `;
        const ringFragmentShader = `
          uniform float uOpacity;
          varying vec3 vColor;
          varying float vOpacity;
          void main() {
            float r = distance(gl_PointCoord, vec2(0.5));
            if (r > 0.5) discard;
            float glow = exp(-pow(r * 2.2, 2.0) * 3.5);
            gl_FragColor = vec4(vColor * (1.5 + glow), glow * vOpacity);
          }
        `;
        const rings = [];
        for(let i=0;i<RING_POOL;i++){
          // Build unit-circle positions (radius=1, will be scaled by uniform)
          const pos = new Float32Array(RING_DOTS * 3);
          const col = new Float32Array(RING_DOTS * 3);
          for(let d=0;d<RING_DOTS;d++){
            const angle = (d / RING_DOTS) * Math.PI * 2;
            pos[d*3]   = Math.cos(angle);
            pos[d*3+1] = Math.sin(angle);
            pos[d*3+2] = 0;
            col[d*3]=1; col[d*3+1]=1; col[d*3+2]=1; // overwritten at spawn
          }
          const ringGeo = new THREE.BufferGeometry();
          ringGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
          ringGeo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
          const ringMat = new THREE.ShaderMaterial({
            uniforms: { uRadius: {value:0.5}, uOpacity: {value:0} },
            vertexShader: ringVertexShader,
            fragmentShader: ringFragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
          });
          const ring = new THREE.Points(ringGeo, ringMat);
          ring.visible = false;
          ring.userData.speed = 1.0;
          world.add(ring);
          rings.push(ring);
        }
        pulseRingsRef.current = rings;

        const animate=()=>{
          if(!rendererRef.current) return;
          if(isPlaying){
            if(!isDragging.current) world.rotation.y+=0.00025;
            const totalHypertrophy=Array.from(lobeHypertrophyRef.current).reduce((a,b)=>a+b,0);
            const evolutionZoom=580+totalHypertrophy*25+smoothedVelocityRef.current*3+consciousnessRef.current*100;
            if(Math.abs(targetZoomRef.current-580)<10) targetZoomRef.current=evolutionZoom;
            zoomRef.current+=(targetZoomRef.current-zoomRef.current)*0.08;
            camera.position.z=zoomRef.current;
            smoothedVelocityRef.current+=(targetVelocityRef.current-smoothedVelocityRef.current)*0.06;
            targetVelocityRef.current*=0.97;
            const currentStress=smoothedVelocityRef.current/100;
            const globalTime=performance.now()*0.001;
            const moodStrength=(emotionsRef.current.joy+emotionsRef.current.curiosity+emotionsRef.current.frustration+emotionsRef.current.satisfaction)/4;
            outerMeshMatRef.current.uniforms.uTime.value=globalTime;
            outerMeshMatRef.current.uniforms.uStress.value=currentStress;
            outerMeshMatRef.current.uniforms.uConsciousness.value=consciousnessRef.current;
            outerMeshMatRef.current.uniforms.uMoodInfluence.value=moodStrength;
            innerMeshMatRef.current.uniforms.uTime.value=globalTime;
            innerMeshMatRef.current.uniforms.uStress.value=currentStress;
            innerMeshMatRef.current.uniforms.uConsciousness.value=consciousnessRef.current;
            innerMeshMatRef.current.uniforms.uDreaming.value=dreamingRef.current;
            innerMeshMatRef.current.uniforms.uMoodInfluence.value=moodStrength;
            innerMeshMatRef.current.uniforms.uMoodColor.value=new THREE.Color(Math.max(0.3,emotionsRef.current.joy),Math.max(0.3,emotionsRef.current.curiosity),Math.max(0.3,emotionsRef.current.satisfaction));
            innerMeshMatRef.current.uniforms.uActiveNeurons.value=activeNeuronPositionsRef.current;
            innerMeshMatRef.current.uniforms.uActiveColors.value=activeNeuronColorsRef.current;
            innerMeshMatRef.current.uniforms.uActiveStrength.value=activeNeuronStrengthRef.current;
            innerMeshMatRef.current.uniforms.uActiveCount.value=activeNeuronCountRef.current;
            for(let i=0;i<4;i++){ lobeHypertrophyRef.current[i]=Math.max(0,lobeHypertrophyRef.current[i]-0.004); lobeMemoryRef.current[i]=Math.max(0,lobeMemoryRef.current[i]-0.002); }
            const progresses=innerMeshMatRef.current.uniforms.uRipplesProgress.value;
            for(let i=0;i<MAX_RIPPLES;i++) if(progresses[i]>0&&progresses[i]<1) progresses[i]+=0.003;
            for(let i=0;i<poolRef.current.length;i++){
              const anim=poolRef.current[i]; if(anim.state==='idle') continue;
              anim.trail.material.uniforms.uTime.value=globalTime;
              if(anim.state==='moving'){
                anim.p+=0.05;
                if(anim.p>=1){ anim.state='decaying'; anim.packet.visible=false; }
                else{ const t=anim.p,mt=1-t; anim.packet.position.set(mt*mt*anim.p0.x+2*mt*t*anim.p1.x+t*t*anim.p2.x,mt*mt*anim.p0.y+2*mt*t*anim.p1.y+t*t*anim.p2.y,mt*mt*anim.p0.z+2*mt*t*anim.p1.z+t*t*anim.p2.z); anim.trail.material.uniforms.uProgress.value=anim.p; }
              } else if(anim.state==='decaying'){
                anim.decay-=0.03; anim.trail.material.uniforms.uDecay.value=anim.decay;
                if(anim.decay<=0){ anim.state='idle'; anim.trail.visible=false; }
              }
            }
            // Animate particle pulse rings: expand radius uniform, fade opacity
            if(pulseRingsRef.current){
              for(let i=0;i<pulseRingsRef.current.length;i++){
                const ring=pulseRingsRef.current[i];
                if(!ring.visible) continue;
                const r = ring.material.uniforms.uRadius.value + ring.userData.speed * 0.55;
                ring.material.uniforms.uRadius.value = r;
                // Fade as ring approaches the cortex shell
                ring.material.uniforms.uOpacity.value = Math.max(0, 0.95 * (1.0 - r / INNER_RADIUS));
                if(r >= INNER_RADIUS){
                  ring.visible = false;
                  ring.material.uniforms.uRadius.value = 0.5;
                  ring.material.uniforms.uOpacity.value = 0;
                }
              }
            }
          }
          renderer.render(scene,camera);
          requestAnimationFrame(animate);
        };
        animate();

        const onWheel=e=>{ e.preventDefault(); targetZoomRef.current=Math.max(10,Math.min(3000,targetZoomRef.current+e.deltaY*0.8)); };
        const onKey=e=>{ if(e.key==='+'||e.key==='=') targetZoomRef.current=Math.max(10,targetZoomRef.current-50); if(e.key==='-') targetZoomRef.current=Math.min(3000,targetZoomRef.current+50); if(e.key==='0') targetZoomRef.current=580; if(e.key==='9') targetZoomRef.current=50; if(e.key==='1') targetZoomRef.current=3000; };
        const onResize=()=>{ camera.aspect=containerRef.current.clientWidth/containerRef.current.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(containerRef.current.clientWidth,containerRef.current.clientHeight); };
        window.addEventListener('wheel',onWheel,{passive:false});
        window.addEventListener('keydown',onKey);
        window.addEventListener('resize',onResize);
        return ()=>{ renderer.dispose(); if(containerRef.current?.contains(renderer.domElement)) containerRef.current.removeChild(renderer.domElement); window.removeEventListener('wheel',onWheel); window.removeEventListener('keydown',onKey); window.removeEventListener('resize',onResize); };
      },[isReady,isPlaying,selectedProfile]);

      const getMoodEmoji=()=>{ const max=Math.max(emotions.joy,emotions.curiosity,emotions.frustration,emotions.satisfaction); if(emotions.joy===max) return "😊"; if(emotions.curiosity===max) return "🤔"; if(emotions.frustration===max) return "😤"; return "😌"; };

      const getStateDescription=()=>{ if(state===STATES.PROCESSING){ if(activeLobe) return `Signal → ${activeLobe} (${currentSignalProgress}%)`; return "Processing..."; } if(state===STATES.AWAKE) return "Awaiting input..."; return state; };

      if(!selectedProfile) return <ProfileSelector onSelectProfile={(key)=>{ setSelectedProfile(key); setCurrentProfileData(BRAIN_PROFILES[key]); }} />;

      const dominantEmotion = Object.entries(emotions).reduce((a,b)=>b[1]>a[1]?b:a);
      const LP = 260, RP = 240;

      return (
        <div style={{display:'flex',width:'100vw',height:'100vh',background:'#00010c',color:'#f1f5f9',fontFamily:'ui-monospace,monospace',userSelect:'none',overflow:'hidden',position:'relative'}}>

          {/* 3D CANVAS */}
          <div ref={containerRef} style={{position:'absolute',inset:0,zIndex:0}}
            onMouseDown={()=>isDragging.current=true}
            onMouseUp={()=>isDragging.current=false}
            onMouseMove={e=>{ if(isDragging.current){ worldRef.current.rotation.y+=e.movementX*0.003; worldRef.current.rotation.x+=e.movementY*0.003; } }}
          />

          {/* TOP BAR */}
          <div style={{position:'absolute',top:0,left:0,right:0,height:46,zIndex:50,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 12px',background:'rgba(0,0,0,0.9)',borderBottom:'1px solid rgba(255,255,255,0.07)',pointerEvents:'auto'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{background:'rgba(5,150,105,0.6)',padding:'5px 8px',borderRadius:7,border:'1px solid rgba(52,211,153,0.35)'}}>
                <BrainCircuit size={16} style={{color:'#34d399',display:'block'}}/>
              </div>
              <div>
                <div style={{fontWeight:900,fontSize:14,color:'#60a5fa',letterSpacing:2}}>CORTEX V48</div>
                <div style={{fontSize:9,color:'#34d399'}}>{currentProfileData?.name} · {(consciousness*100).toFixed(0)}% Conscious · {isPlaying?'LIVE':'PAUSED'}</div>
              </div>
              <div style={{display:'flex',gap:4,marginLeft:10}}>
                <button onClick={()=>setShowLeft(v=>!v)} style={{fontSize:9,padding:'3px 8px',borderRadius:4,border:`1px solid ${showLeft?'rgba(52,211,153,0.5)':'rgba(255,255,255,0.1)'}`,background:showLeft?'rgba(52,211,153,0.1)':'transparent',color:showLeft?'#34d399':'#334155',cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>
                  {showLeft?'◀':'▶'} FEED
                </button>
                <button onClick={()=>setShowRight(v=>!v)} style={{fontSize:9,padding:'3px 8px',borderRadius:4,border:`1px solid ${showRight?'rgba(96,165,250,0.5)':'rgba(255,255,255,0.1)'}`,background:showRight?'rgba(96,165,250,0.1)':'transparent',color:showRight?'#60a5fa':'#334155',cursor:'pointer',fontFamily:'inherit',transition:'all 0.2s'}}>
                  BRAIN {showRight?'▶':'◀'}
                </button>
              </div>
            </div>
            <div style={{display:'flex',gap:5,alignItems:'center'}}>
              {[['PULSE',velocity,'#34d399'],['EVENTS',evolutionScore,'#facc15'],['PATTERNS',patternRecognition,'#22d3ee'],['COMPLEX',emergentComplexity,'#c084fc']].map(([l,v,c])=>(
                <div key={l} style={{background:'rgba(0,0,0,0.5)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:5,padding:'3px 8px',textAlign:'center',minWidth:52}}>
                  <div style={{fontSize:8,color:'#334155',letterSpacing:0.5}}>{l}</div>
                  <div style={{fontWeight:900,fontSize:12,color:c}}>{v}</div>
                </div>
              ))}
              <button onClick={()=>setIsPlaying(!isPlaying)} style={{padding:'5px 10px',borderRadius:5,border:'1px solid rgba(255,255,255,0.15)',background:isPlaying?'rgba(15,23,42,0.7)':'rgba(37,99,235,0.7)',color:'white',cursor:'pointer',display:'flex',alignItems:'center',gap:4,fontSize:10,fontWeight:700,fontFamily:'inherit'}}>
                {isPlaying?<><Pause size={10}/> PAUSE</>:<><Play size={10}/> PLAY</>}
              </button>
            </div>
          </div>

          {/* LEFT PANEL — slides off-screen when hidden */}
          <div style={{position:'absolute',top:46,left:showLeft?0:-LP,bottom:42,width:LP,zIndex:40,display:'flex',flexDirection:'column',background:'rgba(0,1,10,0.93)',borderRight:'1px solid rgba(255,255,255,0.07)',transition:'left 0.22s cubic-bezier(0.4,0,0.2,1)',pointerEvents:showLeft?'auto':'none'}}>
            <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
              <span style={{fontSize:10,fontWeight:700,color:'#34d399',letterSpacing:1}}>LIVE GITHUB EVENTS</span>
              <div style={{display:'flex',alignItems:'center',gap:5}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:feedConnected?'#34d399':'#ef4444',boxShadow:feedConnected?'0 0 6px #34d399':'none'}}></div>
                <span style={{fontSize:8,color:'#334155'}}>{feedConnected?'LIVE':'CONNECTING'}</span>
              </div>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'3px 0'}}>
              {liveFeed.length===0&&(
                <div style={{padding:'20px 14px',fontSize:11,color:'#1e293b',textAlign:'center'}}>Waiting for events...</div>
              )}
              {liveFeed.map((item,i)=>(
                <div key={item.id} style={{padding:'8px 12px 6px 10px',borderLeft:`3px solid ${item.color}`,marginBottom:1,background:i===0?'rgba(255,255,255,0.035)':'transparent',opacity:Math.max(0.2,1-i*0.022)}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:9,fontWeight:700,color:item.color,background:`${item.color}1a`,padding:'1px 5px',borderRadius:3,letterSpacing:0.5}}>{item.type}</span>
                    <span style={{fontSize:8,color:'#1e293b'}}>{item.ts}</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:'#e2e8f0',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>@{item.user}</div>
                  <div style={{fontSize:10,color:'#64748b',wordBreak:'break-all',lineHeight:1.4,marginBottom:2}}>{item.repo}</div>
                  <div style={{fontSize:8,color:'#1e293b'}}>→ {item.lobe}</div>
                </div>
              ))}
            </div>
          </div>

          {/* RIGHT PANEL — slides off-screen when hidden */}
          <div style={{position:'absolute',top:46,right:showRight?0:-RP,bottom:42,width:RP,zIndex:40,display:'flex',flexDirection:'column',background:'rgba(0,1,10,0.93)',borderLeft:'1px solid rgba(255,255,255,0.07)',transition:'right 0.22s cubic-bezier(0.4,0,0.2,1)',pointerEvents:showRight?'auto':'none',overflowY:'auto'}}>

            {/* Profile */}
            <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                <span style={{fontSize:9,fontWeight:700,color:'#334155',letterSpacing:1}}>BRAIN PROFILE</span>
                <button onClick={()=>setMenuOpen(v=>!v)} style={{fontSize:9,color:'#34d399',border:'1px solid rgba(52,211,153,0.25)',padding:'1px 6px',borderRadius:3,background:'transparent',cursor:'pointer',fontFamily:'inherit'}}>{menuOpen?'CLOSE':'SWITCH'}</button>
              </div>
              <div style={{fontSize:12,fontWeight:900,color:'#34d399',marginBottom:2}}>{currentProfileData?.name}</div>
              <div style={{fontSize:9,color:'#1e293b',lineHeight:1.4}}>{currentProfileData?.description}</div>
              {menuOpen&&(
                <div style={{marginTop:6,display:'flex',flexDirection:'column',gap:2}}>
                  {Object.entries(BRAIN_PROFILES).map(([key,p])=>(
                    <button key={key} onClick={()=>{setSelectedProfile(key);setCurrentProfileData(p);setMenuOpen(false);}}
                      style={{textAlign:'left',padding:'5px 7px',borderRadius:4,border:`1px solid ${selectedProfile===key?'rgba(52,211,153,0.5)':'rgba(255,255,255,0.06)'}`,background:selectedProfile===key?'rgba(52,211,153,0.07)':'rgba(0,0,0,0.3)',cursor:'pointer',color:selectedProfile===key?'#34d399':'#64748b',fontSize:10,fontFamily:'inherit',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <span style={{fontWeight:700}}>{p.name}</span>
                      <span style={{fontSize:8,color:'#1e293b'}}>{Math.round(p.innerCount/1000)}k neurons</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Consciousness */}
            <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <span style={{fontSize:9,fontWeight:700,color:'#334155',letterSpacing:1}}>CONSCIOUSNESS</span>
                <span style={{fontSize:14,fontWeight:900,color:'#c084fc'}}>{(consciousness*100).toFixed(1)}%</span>
              </div>
              <div style={{height:5,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden',marginBottom:3}}>
                <div style={{height:'100%',width:`${consciousness*100}%`,background:'linear-gradient(90deg,#7c3aed,#c084fc)',borderRadius:3,transition:'width 0.5s'}}></div>
              </div>
              <div style={{fontSize:9,color:'#334155'}}>{getStateDescription()}</div>
            </div>

            {/* Active signal */}
            {currentEvent&&(
              <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)',flexShrink:0}}>
                <div style={{fontSize:9,fontWeight:700,color:'#334155',letterSpacing:1,marginBottom:5}}>ACTIVE SIGNAL</div>
                <div style={{fontSize:8,color:'#334155',marginBottom:1}}>ROUTING TO</div>
                <div style={{fontSize:11,fontWeight:700,color:'#60a5fa',marginBottom:5}}>{activeLobe}</div>
                <div style={{fontSize:8,color:'#334155',marginBottom:1}}>REPOSITORY</div>
                <div style={{fontSize:10,color:'#94a3b8',wordBreak:'break-all',lineHeight:1.4,marginBottom:4}}>{currentEvent}</div>
                {memoryMatches.length>0&&<div style={{fontSize:9,color:'#c084fc',marginTop:2}}>⚡ {memoryMatches.length} memory {memoryMatches.length===1?'match':'matches'}</div>}
              </div>
            )}

            {/* Emotions */}
            <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)',flexShrink:0}}>
              <div style={{fontSize:9,fontWeight:700,color:'#334155',letterSpacing:1,marginBottom:6}}>EMOTIONAL STATE</div>
              {[['Joy','joy','#34d399'],['Curiosity','curiosity','#22d3ee'],['Frustration','frustration','#f87171'],['Satisfaction','satisfaction','#facc15']].map(([label,key,color])=>(
                <div key={key} style={{marginBottom:5}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontSize:9,color:dominantEmotion[0]===key?color:'#334155',fontWeight:dominantEmotion[0]===key?700:400}}>{label}{dominantEmotion[0]===key?' ◀':''}</span>
                    <span style={{fontSize:9,fontWeight:700,color}}>{(emotions[key]*100).toFixed(0)}%</span>
                  </div>
                  <div style={{height:3,background:'rgba(255,255,255,0.05)',borderRadius:2}}>
                    <div style={{height:'100%',width:`${emotions[key]*100}%`,background:color,borderRadius:2,transition:'width 0.3s',opacity:0.85}}></div>
                  </div>
                </div>
              ))}
            </div>

            {/* Lobe Activity */}
            <div style={{padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,0.06)',flexShrink:0}}>
              <div style={{fontSize:9,fontWeight:700,color:'#334155',letterSpacing:1,marginBottom:6}}>LOBE ACTIVITY</div>
              {LOBES.map((lobe,idx)=>(
                <div key={idx} style={{marginBottom:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontSize:9,color:'#475569'}}>{lobe.name}</span>
                    <span style={{fontSize:9,fontWeight:700,color:lobe.color}}>{Math.round(lobeActivityRef.current[idx]*100)}%</span>
                  </div>
                  <div style={{height:3,background:'rgba(255,255,255,0.05)',borderRadius:2}}>
                    <div style={{height:'100%',width:`${lobeActivityRef.current[idx]*100}%`,background:lobe.color,borderRadius:2,transition:'width 0.2s'}}></div>
                  </div>
                  <div style={{fontSize:8,color:'#1e293b',marginTop:1}}>{lobe.function}</div>
                </div>
              ))}
            </div>

            {/* Neural Metrics */}
            <div style={{padding:'8px 12px',flexShrink:0}}>
              <div style={{fontSize:9,fontWeight:700,color:'#334155',letterSpacing:1,marginBottom:6}}>NEURAL METRICS</div>
              {[['Plasticity',neuralPlasticity,'#facc15',100],['Patterns',patternRecognition,'#22d3ee',200],['Complexity',emergentComplexity,'#c084fc',100]].map(([label,val,color,max])=>(
                <div key={label} style={{marginBottom:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontSize:9,color:'#475569'}}>{label}</span>
                    <span style={{fontSize:10,fontWeight:700,color}}>{val}</span>
                  </div>
                  <div style={{height:3,background:'rgba(255,255,255,0.05)',borderRadius:2}}>
                    <div style={{height:'100%',width:`${Math.min(100,(val/max)*100)}%`,background:color,borderRadius:2,opacity:0.75}}></div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* BOTTOM BAR */}
          <div style={{position:'absolute',bottom:0,left:0,right:0,height:42,zIndex:50,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 12px',background:'rgba(0,0,0,0.9)',borderTop:'1px solid rgba(255,255,255,0.06)',pointerEvents:'auto'}}>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <span style={{fontSize:8,color:'#1e293b',marginRight:4,letterSpacing:1}}>ZOOM</span>
              {[[50,'Deep'],[200,'Close'],[580,'Default'],[1200,'Far'],[3000,'Max']].map(([z,label])=>(
                <button key={z} onClick={()=>targetZoomRef.current=z}
                  style={{fontSize:9,padding:'3px 8px',borderRadius:4,border:'1px solid rgba(255,255,255,0.08)',background:'rgba(15,23,42,0.5)',color:'#475569',cursor:'pointer',fontFamily:'inherit'}}>
                  {label}
                </button>
              ))}
              <span style={{fontSize:8,color:'#1e293b',marginLeft:6}}>scroll · +/- · 0 9 1</span>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {[['#ef4444','Exec'],['#f97316','Sens'],['#facc15','Mem'],['#4ade80','Cog'],['#22d3ee','Assoc'],['#818cf8','Temp'],['#f472b6','Emot'],['#a78bfa','Integ']].map(([c,l])=>(
                <div key={l} style={{display:'flex',alignItems:'center',gap:3}}>
                  <div style={{width:5,height:5,borderRadius:'50%',background:c,boxShadow:`0 0 3px ${c}`}}></div>
                  <span style={{fontSize:8,color:'#334155'}}>{l}</span>
                </div>
              ))}
            </div>
          </div>

          {!isReady&&<div style={{position:'absolute',inset:0,background:'black',zIndex:50,display:'flex',alignItems:'center',justifyContent:'center'}}><RefreshCw size={40} style={{color:'#10b981',opacity:0.4}}/></div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
